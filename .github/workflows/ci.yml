name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  build-test:
    name: Build & test (all features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The whole workspace is pure prost now (no rust-protobuf, no protoc).
      # --all-features keeps future opt-in features covered; --examples checks
      # the public API surface every example exercises. --locked guards that the
      # committed Cargo.lock stays in sync with the manifests.
      - name: Build (libs + examples, all features)
        run: cargo build --workspace --all-features --examples --locked
      - name: Test
        run: cargo test --workspace --all-features --locked

  clippy:
    name: Clippy (advisory)
    runs-on: ubuntu-latest
    # Advisory only: the vendored generated code is not lint-clean and we do not
    # want to gate PRs on it. Surfaces lints without failing the build.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-features --all-targets --locked

  codegen-sync:
    name: Proto codegen in sync
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # One job per proto crate: Steam plus the per-game game-coordinator crates.
      matrix:
        crate:
          - steam-wire-proto-steam
          - steam-wire-proto-tf2
          - steam-wire-proto-csgo
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Regenerate the committed Rust from the .proto sources (pure Rust, no
      # protoc) and fail if it drifts — keeps generated code and sources honest.
      - name: Regenerate ${{ matrix.crate }} from .proto sources
        run: |
          cargo run -q -p steam-wire-proto-build --locked -- \
            crates/${{ matrix.crate }}/protos \
            crates/${{ matrix.crate }}/src/generated
      - name: Verify generated code is committed & in sync
        run: |
          if ! git diff --quiet -- crates/${{ matrix.crate }}/src/generated; then
            echo "::error::Generated protobuf code for ${{ matrix.crate }} is out of sync with the .proto sources."
            echo "Run the codegen locally and commit the result:"
            echo "  cargo run -p steam-wire-proto-build -- crates/${{ matrix.crate }}/protos crates/${{ matrix.crate }}/src/generated"
            git --no-pager diff --stat -- crates/${{ matrix.crate }}/src/generated
            exit 1
          fi
          echo "Generated code for ${{ matrix.crate }} matches the .proto sources."
